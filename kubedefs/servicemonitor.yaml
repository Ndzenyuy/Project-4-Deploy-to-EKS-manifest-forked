apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lumiatech-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - lumiatech
  selector:
    matchLabels:
      app: lumia-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s