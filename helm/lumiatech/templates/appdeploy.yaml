apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumia-app
  labels: 
    app: lumia-app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: lumia-app
  template:
    metadata:
      labels:
        app: lumia-app
    spec:
      containers:
      - name: lumia-app
        image: {{ .Values.app.image }}
        env:
        - name: JDBC_URL
          value: "jdbc:mysql://lumiadb:3306/{{ .Values.db.name }}?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull"
        - name: JDBC_USERNAME
          value: "{{ .Values.db.user }}"
        - name: JDBC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db-pass
      initContainers:
      - name: init-mydb
        image: busybox
        command: ['sh', '-c']
        args: ['until nslookup lumiadb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done;']
